<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>小说阅读器</title>
<style>
  body {
    margin: 0;
    font-family: serif;
    transition: all 0.3s;
  }

  .toolbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: #eee;
    padding: 10px;
    display: flex;
    gap: 10px;
    z-index: 1000;
  }

  .reader {
    padding: 80px 40px 40px;
    max-width: 800px;
    margin: auto;
    line-height: 1.8;
    font-size: 18px;
  }

  .dark {
    background: #1e1e1e;
    color: #ddd;
  }

  .page-btns {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  button {
    padding: 6px 12px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="toolbar">
  <input type="file" id="fileInput" accept=".txt" />
  <button onclick="prevPage()">上一页</button>
  <button onclick="nextPage()">下一页</button>

  字号：
  <input type="range" min="14" max="32" value="18" id="fontSize" />

  行距：
  <input type="range" min="1.2" max="3" step="0.1" value="1.8" id="lineHeight" />

  <button onclick="toggleDark()">夜间模式</button>
</div>

<div id="reader" class="reader"></div>

<div class="page-btns">
  <span id="pageInfo"></span>
</div>

<script>
let content = "";
let pages = [];
let currentPage = 0;
let charsPerPage = 1200;

const reader = document.getElementById("reader");

document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const readerFile = new FileReader();

  readerFile.onload = function() {
    content = readerFile.result;
    paginate();
    currentPage = 0;
    render();
  };

  readerFile.readAsText(file, "utf-8");
});

function paginate() {
  pages = [];
  for (let i = 0; i < content.length; i += charsPerPage) {
    pages.push(content.slice(i, i + charsPerPage));
  }
}

function render() {
  reader.innerText = pages[currentPage] || "";
  document.getElementById("pageInfo").innerText =
    `第 ${currentPage + 1} / ${pages.length} 页`;

  localStorage.setItem("page", currentPage);
}

function nextPage() {
  if (currentPage < pages.length - 1) {
    currentPage++;
    render();
  }
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    render();
  }
}

// 字号调节
document.getElementById("fontSize").addEventListener("input", e => {
  reader.style.fontSize = e.target.value + "px";
});

// 行距调节
document.getElementById("lineHeight").addEventListener("input", e => {
  reader.style.lineHeight = e.target.value;
});

// 夜间模式
function toggleDark() {
  document.body.classList.toggle("dark");
}

// 恢复进度
window.onload = () => {
  const savedPage = localStorage.getItem("page");
  if (savedPage) {
    currentPage = parseInt(savedPage);
  }
};
</script>

</body>
</html>
